<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Barnese — Chemistry Teaching Materials</title>
  <meta name="description" content="Chemistry teaching materials: notes, worksheets, labs, and practice problems.">

  <style>
    /* ---------------------------------------------------------------
       DESIGN TOKENS  — change a value here and it updates everywhere.
       Palette is grounded in the subject: barium (Ba, element 56)
       burns green in a flame test, so green is the accent.
    ----------------------------------------------------------------*/
    :root {
      --paper:      #F8F9F8;  /* page background (cool near-white) */
      --ink:        #16211B;  /* main text (near-black w/ green cast) */
      --ink-soft:   #5A6560;  /* secondary / muted text */
      --flame:      #5FB84B;  /* barium-green accent */
      --flame-deep: #1E7A44;  /* darker green for links (readable) */
      --line:       #E2E6E2;  /* hairline dividers */
      --measure:    38rem;    /* max content width */
    }

    /* ---- base ---- */
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.55;
      padding: clamp(1.5rem, 5vw, 4rem) 1.25rem;
    }
    .wrap { max-width: var(--measure); margin: 0 auto; }

    /* ---- header: the element tile is the signature ---- */
    header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    /* the periodic-table-style tile — this is the one bold element */
    .tile {
      width: 96px;
      flex: 0 0 96px;
      aspect-ratio: 1 / 1;
      background: var(--ink);
      color: var(--flame);
      border-radius: 10px;
      padding: 8px 10px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      box-shadow: 0 0 0 1px var(--flame) inset, 0 6px 20px rgba(22,33,27,.15);
    }
    .tile .num  { font-size: .72rem; opacity: .85; }
    .tile .sym  { font-size: 2.1rem; font-weight: 700; align-self: center; letter-spacing: .02em; }
    .tile .mass { font-size: .6rem; opacity: .8; text-align: right; line-height: 1.3; }

    .lockup { min-width: 12rem; }
    .wordmark {
      margin: 0;
      font-size: clamp(2rem, 7vw, 2.9rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }
    .intro {
      margin: .4rem 0 0;
      color: var(--ink-soft);
      font-size: 1.05rem;
    }

    /* ---- materials list ---- */
    main { margin-top: clamp(2rem, 6vw, 3.5rem); }

    .eyebrow {
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 0 0 .75rem;
    }

    ul.materials { list-style: none; margin: 0; padding: 0; }
    ul.materials li { border-top: 1px solid var(--line); }
    ul.materials li:last-child { border-bottom: 1px solid var(--line); }

    /* each link is one clean row — see the comment below to add more */
    ul.materials a {
      display: flex;
      align-items: baseline;
      gap: .75rem;
      padding: .95rem .25rem .95rem 0;
      text-decoration: none;
      color: var(--ink);
      border-left: 3px solid transparent;
      padding-left: .9rem;
      margin-left: -.9rem;
      transition: border-color .15s ease, transform .15s ease, color .15s ease;
    }
    ul.materials a::before {
      content: "→";
      color: var(--flame-deep);
      font-family: ui-monospace, monospace;
    }
    ul.materials a:hover,
    ul.materials a:focus-visible {
      border-left-color: var(--flame);
      transform: translateX(3px);
      color: var(--flame-deep);
      outline: none;
    }
    ul.materials a:focus-visible { text-decoration: underline; }

    /* ---- footer ---- */
    footer {
      margin-top: clamp(2.5rem, 7vw, 4rem);
      padding-top: 1.25rem;
      border-top: 1px solid var(--line);
      color: var(--ink-soft);
      font-size: .9rem;
    }
    footer a { color: var(--flame-deep); }

    /* respect users who prefer no motion */
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <!-- The element tile: Barium (Ba), atomic number 56. -->
      <div class="tile" aria-hidden="true">
        <div class="num">56</div>
        <div class="sym">Ba</div>
        <div class="mass">Barium<br>137.33</div>
      </div>

      <div class="lockup">
        <h1 class="wordmark">Barnese</h1>
        <p class="intro">Chemistry teaching materials — notes, worksheets, labs, and practice.</p>
      </div>
    </header>

    <main>
      <p class="eyebrow">Materials</p>

      <ul class="materials">
        <!-- ============================================================
             TO ADD A MATERIAL: copy one <li> line below, change the
             href (the link) and the text, and you're done.
             Replace href="#" with the real URL of your file/page.
        ============================================================= -->
        <li><a href="chem4-worksheet-12.pdf">Chem 4 — Worksheet 12</a></li>
        <li><a href="#">Periodic trends — lecture notes</a></li>
        <li><a href="#">Titration — lab handout</a></li>
        <!-- ↑ these three are placeholders. Edit or delete them. -->
      </ul>
    </main>



  </div>
</body>
</html>
